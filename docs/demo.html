<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHSA — Démo Triage Médical</title>
<style>
  :root {
    --accent: #2563eb;
    --border: #e5e7eb;
    --text: #1f2937;
    --muted: #6b7280;
    --bg: #f9fafb;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 960px;
    margin: 40px auto;
    padding: 0 24px;
    color: var(--text);
    line-height: 1.5;
    background: #fff;
  }

  h1 {
    font-size: 24px;
    font-weight: 600;
    margin: 0 0 24px;
    letter-spacing: -0.3px;
  }

  .config {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 14px 18px;
    border-radius: 8px;
    margin-bottom: 24px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
    font-size: 13px;
  }
  .config label { display: flex; align-items: center; gap: 6px; color: var(--muted); }
  .config input {
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 5px;
    font-family: "SF Mono", Consolas, monospace;
    font-size: 12px;
    background: #fff;
  }
  .config input[type=text] { min-width: 300px; }
  .config input:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: var(--accent); }
  .config button {
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: #fff;
    border-radius: 5px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .config button:hover { background: var(--bg); }

  .status { font-weight: 500; font-size: 13px; }
  .status.ok { color: #059669; }
  .status.ko { color: #dc2626; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }

  .card {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    background: #fff;
  }
  .card h2 {
    margin: 0 0 14px;
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
  }

  .examples {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .examples button {
    padding: 5px 12px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: #fff;
    border-radius: 14px;
    cursor: pointer;
    color: var(--text);
    transition: all 0.1s;
  }
  .examples button:hover { border-color: var(--accent); color: var(--accent); }

  label { display: block; font-size: 13px; margin-top: 12px; color: var(--text); }
  label .field-label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 3px; }

  input[type=text], input[type=number], select, textarea {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 5px;
    font-size: 13px;
    font-family: inherit;
    background: #fff;
    transition: border-color 0.1s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
  }
  textarea { min-height: 80px; resize: vertical; }
  .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  .submit {
    margin-top: 18px;
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 5px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.1s;
  }
  .submit:hover { background: #1d4ed8; }
  .submit:disabled { background: #9ca3af; cursor: not-allowed; }

  #result { min-height: 160px; font-size: 13px; }
  .empty, .loading {
    color: var(--muted);
    text-align: center;
    padding: 40px 20px;
    font-size: 13px;
  }

  .badge {
    display: inline-block;
    padding: 5px 12px;
    border-radius: 4px;
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 12px;
    border: 1px solid;
  }
  .P1 { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
  .P2 { background: #fffbeb; color: #b45309; border-color: #fde68a; }
  .P3 { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
  .NON { background: var(--bg); color: var(--muted); border-color: var(--border); }

  .response {
    background: var(--bg);
    padding: 12px 14px;
    border-radius: 6px;
    border-left: 3px solid var(--accent);
    white-space: pre-wrap;
    font-size: 13px;
    line-height: 1.55;
    max-height: 340px;
    overflow-y: auto;
  }
  .meta {
    margin-top: 10px;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
</style>
</head>
<body>

<h1>CHSA — Démo Agent IA de Triage Médical</h1>

<div class="config">
  <label>API <input type="text" id="api-url" value="https://marintosti-chsa-triage-api.hf.space"></label>
  <label>Clé <input type="password" id="api-key" value="123456"></label>
  <span class="status" id="status">—</span>
  <button onclick="checkHealth()">Tester</button>
</div>

<div class="grid">
  <div class="card">
    <h2>Patient</h2>

    <div class="examples">
      <button onclick="loadCase('infarctus')">Infarctus</button>
      <button onclick="loadCase('anaphylaxie')">Anaphylaxie</button>
      <button onclick="loadCase('appendicite')">Appendicite</button>
      <button onclick="loadCase('angine')">Angine</button>
      <button onclick="loadCase('entorse')">Entorse</button>
    </div>

    <form id="form">
      <label><span class="field-label">Symptômes</span>
        <textarea id="symptoms" required></textarea>
      </label>
      <div class="row">
        <label><span class="field-label">Âge</span><input type="number" id="age" min="0" max="120"></label>
        <label><span class="field-label">Sexe</span>
          <select id="sex"><option value="">—</option><option value="M">M</option><option value="F">F</option></select>
        </label>
        <label><span class="field-label">ID patient</span><input type="text" id="patient-id"></label>
      </div>
      <label><span class="field-label">Antécédents</span><input type="text" id="medical-history"></label>
      <div class="row">
        <label><span class="field-label">FC (bpm)</span><input type="number" id="fc"></label>
        <label><span class="field-label">TA</span><input type="text" id="ta" placeholder="120/80"></label>
        <label><span class="field-label">SpO2 (%)</span><input type="number" id="spo2"></label>
      </div>
      <button type="submit" class="submit" id="submit-btn">Évaluer</button>
    </form>
  </div>

  <div class="card">
    <h2>Évaluation</h2>
    <div id="result">
      <div class="empty">Sélectionnez un cas type ou remplissez le formulaire.</div>
    </div>
  </div>
</div>

<script>
  const CASES = {
    infarctus: {
      symptoms: "Douleur thoracique aigüe irradiant au bras gauche, sueurs froides, depuis 30 minutes",
      age: 58, sex: "M", "patient-id": "PAT-001",
      "medical-history": "Hypertension, ancien fumeur",
      fc: 112, ta: "150/95", spo2: 94,
    },
    anaphylaxie: {
      symptoms: "Éruption cutanée diffuse, œdème des lèvres, dyspnée après ingestion de cacahuètes",
      age: 3, sex: "F", "patient-id": "PAT-002",
      "medical-history": "Terrain atopique",
      fc: 140, ta: "", spo2: 91,
    },
    appendicite: {
      symptoms: "Douleur abdominale en fosse iliaque droite depuis 12h, nausées, fièvre modérée",
      age: 22, sex: "F", "patient-id": "PAT-003",
      "medical-history": "",
      fc: 98, ta: "125/78", spo2: 99,
    },
    angine: {
      symptoms: "Mal de gorge depuis 2 jours, déglutition douloureuse, fièvre légère",
      age: 30, sex: "F", "patient-id": "PAT-004",
      "medical-history": "",
      fc: 85, ta: "118/75", spo2: 99,
    },
    entorse: {
      symptoms: "Douleur cheville droite après chute, légère tuméfaction, appui partiel possible",
      age: 25, sex: "M", "patient-id": "PAT-005",
      "medical-history": "",
      fc: 78, ta: "125/80", spo2: 100,
    },
  };

  function loadCase(key) {
    const c = CASES[key];
    for (const [field, val] of Object.entries(c)) {
      const el = document.getElementById(field);
      if (el) el.value = val ?? "";
    }
  }

  async function checkHealth() {
    const el = document.getElementById("status");
    const url = document.getElementById("api-url").value.replace(/\/$/, "");
    el.textContent = "vérification…";
    el.className = "status";
    try {
      const r = await fetch(url + "/health");
      if (!r.ok) throw 0;
      const b = await r.json();
      if (b.backend === "mock") { el.textContent = "mock (aucun modèle)"; el.className = "status ko"; }
      else { el.textContent = "connecté (" + b.backend + ")"; el.className = "status ok"; }
    } catch { el.textContent = "inaccessible"; el.className = "status ko"; }
  }

  document.getElementById("form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const url = document.getElementById("api-url").value.replace(/\/$/, "");
    const key = document.getElementById("api-key").value;

    const vitals = {};
    const fc = document.getElementById("fc").value;
    const ta = document.getElementById("ta").value;
    const spo2 = document.getElementById("spo2").value;
    if (fc) vitals.fc = parseInt(fc);
    if (ta) vitals.ta = ta;
    if (spo2) vitals.spo2 = parseInt(spo2);

    const payload = {
      patient_id: document.getElementById("patient-id").value || null,
      symptoms: document.getElementById("symptoms").value,
      age: parseInt(document.getElementById("age").value) || null,
      sex: document.getElementById("sex").value || null,
      medical_history: document.getElementById("medical-history").value || null,
      vital_signs: Object.keys(vitals).length ? vitals : null,
    };

    const btn = document.getElementById("submit-btn");
    const res = document.getElementById("result");
    btn.disabled = true;
    btn.textContent = "Analyse…";
    res.innerHTML = '<div class="loading">Analyse en cours (~40s sur CPU)…</div>';

    try {
      const r = await fetch(url + "/triage", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-API-Key": key },
        body: JSON.stringify(payload),
      });
      if (!r.ok) {
        res.innerHTML = '<div class="empty" style="color:#dc2626;">Erreur HTTP ' + r.status + '</div>';
        return;
      }
      const body = await r.json();
      render(body);
    } catch (err) {
      res.innerHTML = '<div class="empty" style="color:#dc2626;">Erreur : ' + esc(err.message) + '</div>';
    } finally {
      btn.disabled = false;
      btn.textContent = "Évaluer";
    }
  });

  function render(body) {
    const p = body.priority_level || "NON DETERMINE";
    const cls = p.startsWith("P1") ? "P1" : p.startsWith("P2") ? "P2" : p.startsWith("P3") ? "P3" : "NON";
    document.getElementById("result").innerHTML =
      '<div class="badge ' + cls + '">' + esc(p) + '</div>' +
      '<div class="response">' + esc(body.explanation || "(vide)") + '</div>' +
      '<div class="meta"><span>Latence : ' + body.latency_ms + ' ms</span><span>Backend : ' + esc(body.backend) + '</span></div>';
  }

  function esc(s) {
    if (s == null) return "";
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
  }

  window.addEventListener("load", checkHealth);
</script>
</body>
</html>
