# Configuration SFT — Fine-tuning supervisé avec LoRA
# Modèle : Qwen3-1.7B-Base sur corpus médical bilingue

model:
  name: "Qwen/Qwen3-1.7B-Base"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

data:
  train_file: "data/sft/train.jsonl"
  eval_file: "data/sft/eval.jsonl"
  max_samples: 5000

lora:
  r: 32 # augmenté de 16 → 32 : plus de capacité pour apprendre le français médical
  lora_alpha: 64 # alpha = 2*r (ratio alpha/r = 2, scaling standard)
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  # NB : pas de modules_to_save (plus rapide, moins de VRAM).
  # Le biais chinois de Qwen3-Base est compensé à l'inférence via sampling + repetition_penalty.

training:
  output_dir: "outputs/sft"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  logging_steps: 10
  eval_strategy: "steps"
  eval_steps: 100
  save_strategy: "steps"
  save_steps: 100
  save_total_limit: 3
  bf16: true
  max_seq_length: 2048
  gradient_checkpointing: true
  report_to: "wandb"
  seed: 42
