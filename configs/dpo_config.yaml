# Configuration DPO — Alignement par préférences
# Modèle : Qwen3-1.7B fine-tuné SFT + LoRA

model:
  name: "outputs/sft/final"  # Modèle SFT fine-tuné (sortie de l'étape précédente)
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

data:
  train_file: "data/dpo/train.jsonl"
  eval_file: "data/dpo/eval.jsonl"

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  output_dir: "outputs/dpo"
  num_train_epochs: 1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  logging_steps: 10
  eval_strategy: "steps"
  eval_steps: 100
  save_strategy: "steps"
  save_steps: 100
  save_total_limit: 3
  bf16: true
  max_length: 2048
  max_prompt_length: 1024
  beta: 0.1
  gradient_checkpointing: true
  report_to: "wandb"
  seed: 42
