name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          # Deps API (pas vLLM ni torch GPU, runner CPU)
          pip install fastapi==0.115.6 'uvicorn[standard]==0.34.0' pydantic==2.10.4 pyyaml==6.0.2 httpx
          pip install pytest==8.3.4 ruff==0.8.4

      - name: Ruff
        run: ruff check src/deployment tests/test_serve.py

      - name: Pytest (API, mode mock)
        env:
          USE_VLLM: "0"
        run: pytest tests/test_serve.py -q

      - name: Docker build (sanity)
        run: docker build -t chsa-triage-api:ci .
